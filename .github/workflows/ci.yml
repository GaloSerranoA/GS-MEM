name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The 86 MB model is NOT needed for tests; only the small tokenizer
      # fixture is. Pull just that LFS object (keeps CI fast + LFS bandwidth low).
      - name: Fetch tokenizer test fixture (LFS)
        run: git lfs pull --include "crates/immortal-tokenizer/tests/fixtures/**"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Build the UI first: gs-mem-server embeds frontend/dist at compile time.
      - name: Build web UI
        working-directory: frontend
        run: npm ci && npm run build

      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (first-party, deny warnings)
        run: cargo clippy -p gs-mem-core -p gs-mem-mcp -p gs-mem-server --all-targets --no-deps -- -D warnings
      - name: tests
        run: cargo nextest run --workspace

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: gs-mem:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
